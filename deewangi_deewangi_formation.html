
<style>
  .stage-wrap { padding: 1rem 0; font-family: var(--font-sans); }
  .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .step-pills { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
  .pill { padding: 4px 12px; border-radius: 99px; font-size: 12px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; transition: all 0.2s; }
  .pill.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .nav-btn { padding: 4px 14px; border-radius: var(--border-radius-md); font-size: 13px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; }
  .nav-btn:hover { background: var(--color-background-secondary); }
  .stage-label { font-size: 11px; color: var(--color-text-tertiary); text-align: center; margin-top: 4px; letter-spacing: 0.05em; }
  .legend { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
  .step-desc { font-size: 13px; color: var(--color-text-secondary); text-align: center; margin-top: 8px; min-height: 20px; }
</style>
<div class="stage-wrap">
  <h2 style="font-size:0;position:absolute;opacity:0;">Deewangi Deewangi formation diagram — animated performer positions across 5 stages</h2>
  <div class="controls">
    <div class="step-pills">
      <button class="pill active" onclick="goTo(0)">Start</button>
      <button class="pill" onclick="goTo(1)">Couples section</button>
      <button class="pill" onclick="goTo(2)">Split</button>
      <button class="pill" onclick="goTo(3)">Men's section</button>
      <button class="pill" onclick="goTo(4)">Finale</button>
    </div>
    <button class="nav-btn" onclick="prev()">&#8592;</button>
    <button class="nav-btn" onclick="next()">&#8594;</button>
  </div>

  <svg id="stage-svg" width="100%" viewBox="0 0 620 400" style="display:block;">
    <defs>
      <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>
    <rect x="40" y="30" width="540" height="320" rx="10" fill="none" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
    <rect x="40" y="30" width="540" height="28" rx="0" fill="var(--color-background-secondary)" stroke="none"/>
    <rect x="40" y="30" width="540" height="28" rx="10" fill="var(--color-background-secondary)" stroke="none"/>
    <rect x="40" y="44" width="540" height="14" fill="var(--color-background-secondary)" stroke="none"/>
    <text x="310" y="48" text-anchor="middle" font-size="11" fill="var(--color-text-tertiary)" font-family="var(--font-sans)" letter-spacing="0.08em">STAGE FRONT — AUDIENCE</text>
    <text x="310" y="338" text-anchor="middle" font-size="11" fill="var(--color-text-tertiary)" font-family="var(--font-sans)" letter-spacing="0.08em">STAGE BACK</text>
    <g id="performers"></g>
    <g id="trails" opacity="0.25"></g>
  </svg>

  <p class="step-desc" id="step-desc">Starting positions — all 16 performers at their opening marks.</p>

  <div class="legend">
    <div class="leg-item"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#D4537E" stroke="#993556" stroke-width="0.5"/></svg> Women (W1–W4)</div>
    <div class="leg-item"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#378ADD" stroke="#185FA5" stroke-width="0.5"/></svg> Men couple (MC1–MC4)</div>
    <div class="leg-item"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/></svg> Men single left (MS1–MS4)</div>
    <div class="leg-item"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#888780" stroke="#5F5E5A" stroke-width="0.5"/></svg> Men back (MB1–MB4)</div>
  </div>
</div>

<script>
const W = 620, stageX = 40, stageY = 30, stageW = 540, stageH = 320;
const cx = stageX + stageW/2;
const top = stageY + 40, bot = stageY + stageH - 30;
const qH = (bot - top) / 4;

const colors = {
  W:  { fill:'#D4537E', stroke:'#993556', label:'W' },
  MC: { fill:'#378ADD', stroke:'#185FA5', label:'MC' },
  MS: { fill:'#1D9E75', stroke:'#0F6E56', label:'MS' },
  MB: { fill:'#888780', stroke:'#5F5E5A', label:'MB' }
};

const steps = [
  {
    desc: 'Starting positions — all 16 performers at their opening marks.',
    positions: [
      {id:'W1', g:'W', x:cx-45, y:top+qH*1.4},
      {id:'W2', g:'W', x:cx-15, y:top+qH*1.4},
      {id:'W3', g:'W', x:cx+15, y:top+qH*1.4},
      {id:'W4', g:'W', x:cx+45, y:top+qH*1.4},
      {id:'MB1',g:'MB',x:cx-45, y:top+qH*0.5},
      {id:'MB2',g:'MB',x:cx-15, y:top+qH*0.5},
      {id:'MB3',g:'MB',x:cx+15, y:top+qH*0.5},
      {id:'MB4',g:'MB',x:cx+45, y:top+qH*0.5},
      {id:'MC1',g:'MC',x:stageX+stageW-60, y:top+qH*1.0},
      {id:'MC2',g:'MC',x:stageX+stageW-60, y:top+qH*1.6},
      {id:'MC3',g:'MC',x:stageX+stageW-60, y:top+qH*2.2},
      {id:'MC4',g:'MC',x:stageX+stageW-60, y:top+qH*2.8},
      {id:'MS1',g:'MS',x:stageX+60, y:top+qH*1.0},
      {id:'MS2',g:'MS',x:stageX+60, y:top+qH*1.6},
      {id:'MS3',g:'MS',x:stageX+60, y:top+qH*2.2},
      {id:'MS4',g:'MS',x:stageX+60, y:top+qH*2.8},
    ]
  },
  {
    desc: 'Couples section — women move downstage, MC joins them center for partner dancing.',
    positions: [
      {id:'W1', g:'W', x:cx-60, y:bot-20},
      {id:'W2', g:'W', x:cx-20, y:bot-20},
      {id:'W3', g:'W', x:cx+20, y:bot-20},
      {id:'W4', g:'W', x:cx+60, y:bot-20},
      {id:'MB1',g:'MB',x:cx-45, y:top+qH*0.5},
      {id:'MB2',g:'MB',x:cx-15, y:top+qH*0.5},
      {id:'MB3',g:'MB',x:cx+15, y:top+qH*0.5},
      {id:'MB4',g:'MB',x:cx+45, y:top+qH*0.5},
      {id:'MC1',g:'MC',x:cx-60, y:bot-55},
      {id:'MC2',g:'MC',x:cx-20, y:bot-55},
      {id:'MC3',g:'MC',x:cx+20, y:bot-55},
      {id:'MC4',g:'MC',x:cx+60, y:bot-55},
      {id:'MS1',g:'MS',x:stageX+60, y:top+qH*1.0},
      {id:'MS2',g:'MS',x:stageX+60, y:top+qH*1.6},
      {id:'MS3',g:'MS',x:stageX+60, y:top+qH*2.2},
      {id:'MS4',g:'MS',x:stageX+60, y:top+qH*2.8},
    ]
  },
  {
    desc: 'Split — 2 couples retreat left-back, 2 couples retreat right-back, clearing center stage.',
    positions: [
      {id:'W1', g:'W', x:stageX+80, y:top+qH*2.0},
      {id:'W2', g:'W', x:stageX+80, y:top+qH*2.8},
      {id:'W3', g:'W', x:stageX+stageW-80, y:top+qH*2.0},
      {id:'W4', g:'W', x:stageX+stageW-80, y:top+qH*2.8},
      {id:'MB1',g:'MB',x:cx-45, y:top+qH*0.5},
      {id:'MB2',g:'MB',x:cx-15, y:top+qH*0.5},
      {id:'MB3',g:'MB',x:cx+15, y:top+qH*0.5},
      {id:'MB4',g:'MB',x:cx+45, y:top+qH*0.5},
      {id:'MC1',g:'MC',x:stageX+120, y:top+qH*1.4},
      {id:'MC2',g:'MC',x:stageX+120, y:top+qH*2.2},
      {id:'MC3',g:'MC',x:stageX+stageW-120, y:top+qH*1.4},
      {id:'MC4',g:'MC',x:stageX+stageW-120, y:top+qH*2.2},
      {id:'MS1',g:'MS',x:stageX+60, y:top+qH*1.0},
      {id:'MS2',g:'MS',x:stageX+60, y:top+qH*1.6},
      {id:'MS3',g:'MS',x:stageX+60, y:top+qH*2.2},
      {id:'MS4',g:'MS',x:stageX+60, y:top+qH*2.8},
    ]
  },
  {
    desc: "Men's section — MB comes downstage and pairs with MS center-left. Couples hold on the sides.",
    positions: [
      {id:'W1', g:'W', x:stageX+80, y:top+qH*2.0},
      {id:'W2', g:'W', x:stageX+80, y:top+qH*2.8},
      {id:'W3', g:'W', x:stageX+stageW-80, y:top+qH*2.0},
      {id:'W4', g:'W', x:stageX+stageW-80, y:top+qH*2.8},
      {id:'MB1',g:'MB',x:cx-80, y:top+qH*1.4},
      {id:'MB2',g:'MB',x:cx-40, y:top+qH*1.4},
      {id:'MB3',g:'MB',x:cx-80, y:top+qH*2.2},
      {id:'MB4',g:'MB',x:cx-40, y:top+qH*2.2},
      {id:'MC1',g:'MC',x:stageX+120, y:top+qH*1.4},
      {id:'MC2',g:'MC',x:stageX+120, y:top+qH*2.2},
      {id:'MC3',g:'MC',x:stageX+stageW-120, y:top+qH*1.4},
      {id:'MC4',g:'MC',x:stageX+stageW-120, y:top+qH*2.2},
      {id:'MS1',g:'MS',x:cx-80, y:top+qH*0.6},
      {id:'MS2',g:'MS',x:cx-40, y:top+qH*0.6},
      {id:'MS3',g:'MS',x:cx-80, y:top+qH*3.0},
      {id:'MS4',g:'MS',x:cx-40, y:top+qH*3.0},
    ]
  },
  {
    desc: 'Finale — all 16 join into two rows of 8 across the full stage.',
    positions: [
      {id:'W1', g:'W', x:cx-210, y:bot-20},
      {id:'W2', g:'W', x:cx-150, y:bot-20},
      {id:'W3', g:'W', x:cx-90,  y:bot-20},
      {id:'W4', g:'W', x:cx-30,  y:bot-20},
      {id:'MB1',g:'MB',x:cx+30,  y:bot-20},
      {id:'MB2',g:'MB',x:cx+90,  y:bot-20},
      {id:'MB3',g:'MB',x:cx+150, y:bot-20},
      {id:'MB4',g:'MB',x:cx+210, y:bot-20},
      {id:'MC1',g:'MC',x:cx-210, y:bot-65},
      {id:'MC2',g:'MC',x:cx-150, y:bot-65},
      {id:'MC3',g:'MC',x:cx-90,  y:bot-65},
      {id:'MC4',g:'MC',x:cx-30,  y:bot-65},
      {id:'MS1',g:'MS',x:cx+30,  y:bot-65},
      {id:'MS2',g:'MS',x:cx+90,  y:bot-65},
      {id:'MS3',g:'MS',x:cx+150, y:bot-65},
      {id:'MS4',g:'MS',x:cx+210, y:bot-65},
    ]
  }
];

let current = 0;
let animReqs = {};
let dotEls = {};

function init() {
  const g = document.getElementById('performers');
  g.innerHTML = '';
  dotEls = {};
  steps[0].positions.forEach(p => {
    const grp = document.createElementNS('http://www.w3.org/2000/svg','g');
    const c = colors[p.g];
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('r','14');
    circle.setAttribute('fill', c.fill);
    circle.setAttribute('stroke', c.stroke);
    circle.setAttribute('stroke-width','1');
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('dominant-baseline','central');
    txt.setAttribute('font-size','8');
    txt.setAttribute('font-family','var(--font-sans)');
    txt.setAttribute('fill','#fff');
    txt.setAttribute('font-weight','500');
    txt.textContent = p.id;
    grp.appendChild(circle);
    grp.appendChild(txt);
    grp.setAttribute('transform',`translate(${p.x},${p.y})`);
    g.appendChild(grp);
    dotEls[p.id] = {el: grp, x: p.x, y: p.y};
  });
}

function animateTo(stepIdx) {
  const targets = {};
  steps[stepIdx].positions.forEach(p => { targets[p.id] = {x:p.x, y:p.y}; });
  Object.keys(dotEls).forEach(id => {
    if (animReqs[id]) cancelAnimationFrame(animReqs[id]);
    const from = {x: dotEls[id].x, y: dotEls[id].y};
    const to = targets[id];
    if (!to) return;
    const start = performance.now();
    const dur = 600;
    function tick(now) {
      const t = Math.min((now - start)/dur, 1);
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      const nx = from.x + (to.x - from.x)*ease;
      const ny = from.y + (to.y - from.y)*ease;
      dotEls[id].el.setAttribute('transform',`translate(${nx},${ny})`);
      if (t < 1) { animReqs[id] = requestAnimationFrame(tick); }
      else { dotEls[id].x = to.x; dotEls[id].y = to.y; }
    }
    animReqs[id] = requestAnimationFrame(tick);
  });
  document.getElementById('step-desc').textContent = steps[stepIdx].desc;
  document.querySelectorAll('.pill').forEach((p,i)=>p.classList.toggle('active', i===stepIdx));
}

function goTo(i) {
  current = i;
  animateTo(i);
}
function next() { if(current < steps.length-1) goTo(current+1); }
function prev() { if(current > 0) goTo(current-1); }

init();
</script>
