<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deewangi Deewangi — Formation Diagram</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; border-radius: 16px; border: 1px solid rgba(0,0,0,0.1); padding: 24px; max-width: 700px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  h1 { font-size: 18px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }
  .ctl { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .pills { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .pill { padding: 5px 13px; border-radius: 99px; font-size: 12px; border: 1px solid #ddd; background: transparent; color: #666; cursor: pointer; transition: all 0.15s; }
  .pill.on { background: #e8f0fe; color: #1a56db; border-color: #93b4f7; }
  .pill:hover:not(.on) { background: #f5f5f5; }
  .nb { padding: 5px 14px; border-radius: 8px; font-size: 13px; border: 1px solid #ddd; background: transparent; color: #333; cursor: pointer; }
  .nb:hover { background: #f5f5f5; }
  canvas { width: 100%; display: block; border: 1px solid rgba(0,0,0,0.1); border-radius: 10px; }
  .desc { font-size: 13px; color: #666; text-align: center; margin-top: 10px; min-height: 20px; }
  .leg { display: flex; gap: 16px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
  .li { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
  .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>
<div class="card">
  <h1>Deewangi Deewangi — Formation Diagram</h1>
  <p class="subtitle">Sangeet performance · 16 performers · 5 sections</p>
  <div class="ctl">
    <div class="pills">
      <button class="pill on" onclick="goTo(0)">Start</button>
      <button class="pill" onclick="goTo(1)">Couples</button>
      <button class="pill" onclick="goTo(2)">Split</button>
      <button class="pill" onclick="goTo(3)">Men's section</button>
      <button class="pill" onclick="goTo(4)">Finale</button>
    </div>
    <button class="nb" onclick="prev()">&#8592;</button>
    <button class="nb" onclick="next()">&#8594;</button>
  </div>
  <canvas id="cv" width="640" height="370"></canvas>
  <p class="desc" id="desc">Starting positions — all 16 performers at their opening marks.</p>
  <div class="leg">
    <div class="li"><div class="dot" style="background:#D4537E;"></div>Women in couple (WC1–WC4)</div>
    <div class="li"><div class="dot" style="background:#378ADD;"></div>Men in couple (MC1–MC4)</div>
    <div class="li"><div class="dot" style="background:#1D9E75;"></div>Men left (ML1–ML4)</div>
    <div class="li"><div class="dot" style="background:#888780;"></div>Men back (MB1–MB4)</div>
  </div>
</div>
<script>
(function(){
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  const W=640,H=370,PAD=32;
  const sX=PAD,sY=PAD+22,sW=W-PAD*2,sH=H-PAD*2-22;
  const midX=sX+sW/2;
  const topY=sY+14,botY=sY+sH-14,span=botY-topY;
  const COL={WC:'#D4537E',MC:'#378ADD',ML:'#1D9E75',MB:'#888780'};

  function p(fx,fy){return{x:sX+fx*sW,y:topY+fy*span};}

  const FRONT=0.92, BACK=0.76, N=16;
  const step=1/(N-1);

  function zigzag(order){
    return order.map((item,i)=>({
      id:item.id, g:item.g,
      ...p(i*step, i%2===0 ? FRONT : BACK)
    }));
  }

  const finaleOrder=[
    {id:'WC1',g:'WC'},{id:'MC1',g:'MC'},
    {id:'WC2',g:'WC'},{id:'MC2',g:'MC'},
    {id:'MB1',g:'MB'},{id:'ML1',g:'ML'},
    {id:'MB2',g:'MB'},{id:'ML2',g:'ML'},
    {id:'MB3',g:'MB'},{id:'ML3',g:'ML'},
    {id:'MB4',g:'MB'},{id:'ML4',g:'ML'},
    {id:'WC3',g:'WC'},{id:'MC3',g:'MC'},
    {id:'WC4',g:'WC'},{id:'MC4',g:'MC'},
  ];

  const steps=[
    {
      desc:'Starting positions — WC center-back, MB top-right, MC stage right, ML stage left.',
      dots:[
        {id:'WC1',g:'WC',...p(0.36,0.20)},{id:'WC2',g:'WC',...p(0.44,0.20)},
        {id:'WC3',g:'WC',...p(0.52,0.20)},{id:'WC4',g:'WC',...p(0.60,0.20)},
        {id:'MB1',g:'MB',...p(0.72,0.08)},{id:'MB2',g:'MB',...p(0.80,0.08)},
        {id:'MB3',g:'MB',...p(0.88,0.08)},{id:'MB4',g:'MB',...p(0.96,0.08)},
        {id:'MC1',g:'MC',...p(0.92,0.28)},{id:'MC2',g:'MC',...p(0.92,0.45)},
        {id:'MC3',g:'MC',...p(0.92,0.62)},{id:'MC4',g:'MC',...p(0.92,0.80)},
        {id:'ML1',g:'ML',...p(0.06,0.28)},{id:'ML2',g:'ML',...p(0.06,0.45)},
        {id:'ML3',g:'ML',...p(0.06,0.62)},{id:'ML4',g:'ML',...p(0.06,0.80)},
      ]
    },
    {
      desc:'Couples — all 8 in one alternating front row: WC1 MC1 WC2 MC2 WC3 MC3 WC4 MC4.',
      dots:[
        {id:'WC1',g:'WC',...p(0.16,0.88)},{id:'MC1',g:'MC',...p(0.25,0.88)},
        {id:'WC2',g:'WC',...p(0.34,0.88)},{id:'MC2',g:'MC',...p(0.43,0.88)},
        {id:'WC3',g:'WC',...p(0.57,0.88)},{id:'MC3',g:'MC',...p(0.66,0.88)},
        {id:'WC4',g:'WC',...p(0.75,0.88)},{id:'MC4',g:'MC',...p(0.84,0.88)},
        {id:'MB1',g:'MB',...p(0.72,0.08)},{id:'MB2',g:'MB',...p(0.80,0.08)},
        {id:'MB3',g:'MB',...p(0.88,0.08)},{id:'MB4',g:'MB',...p(0.96,0.08)},
        {id:'ML1',g:'ML',...p(0.06,0.28)},{id:'ML2',g:'ML',...p(0.06,0.45)},
        {id:'ML3',g:'ML',...p(0.06,0.62)},{id:'ML4',g:'ML',...p(0.06,0.80)},
      ]
    },
    {
      desc:'Split — couples mirror each other on opposite sides. ML waits front-left for MB to enter.',
      dots:[
        {id:'WC1',g:'WC',...p(0.06,0.42)},{id:'MC1',g:'MC',...p(0.14,0.50)},
        {id:'WC2',g:'WC',...p(0.06,0.62)},{id:'MC2',g:'MC',...p(0.14,0.70)},
        {id:'WC3',g:'WC',...p(0.94,0.42)},{id:'MC3',g:'MC',...p(0.86,0.50)},
        {id:'WC4',g:'WC',...p(0.94,0.62)},{id:'MC4',g:'MC',...p(0.86,0.70)},
        {id:'MB1',g:'MB',...p(0.72,0.08)},{id:'MB2',g:'MB',...p(0.80,0.08)},
        {id:'MB3',g:'MB',...p(0.88,0.08)},{id:'MB4',g:'MB',...p(0.96,0.08)},
        {id:'ML1',g:'ML',...p(0.06,0.82)},{id:'ML2',g:'ML',...p(0.14,0.82)},
        {id:'ML3',g:'ML',...p(0.22,0.82)},{id:'ML4',g:'ML',...p(0.30,0.82)},
      ]
    },
    {
      desc:"Men's section — MB and ML alternate side by side center stage. Couples hold on sides.",
      dots:[
        {id:'WC1',g:'WC',...p(0.06,0.42)},{id:'MC1',g:'MC',...p(0.14,0.50)},
        {id:'WC2',g:'WC',...p(0.06,0.62)},{id:'MC2',g:'MC',...p(0.14,0.70)},
        {id:'WC3',g:'WC',...p(0.94,0.42)},{id:'MC3',g:'MC',...p(0.86,0.50)},
        {id:'WC4',g:'WC',...p(0.94,0.62)},{id:'MC4',g:'MC',...p(0.86,0.70)},
        {id:'MB1',g:'MB',...p(0.32,0.88)},{id:'ML1',g:'ML',...p(0.42,0.88)},
        {id:'MB2',g:'MB',...p(0.52,0.88)},{id:'ML2',g:'ML',...p(0.62,0.88)},
        {id:'MB3',g:'MB',...p(0.32,0.70)},{id:'ML3',g:'ML',...p(0.42,0.70)},
        {id:'MB4',g:'MB',...p(0.52,0.70)},{id:'ML4',g:'ML',...p(0.62,0.70)},
      ]
    },
    {
      desc:'Finale — clean zig-zag: each dot alternates front/back, evenly spaced left to right.',
      dots: zigzag(finaleOrder)
    }
  ];

  let cur=0;
  let state=steps[0].dots.map(d=>({...d}));
  let animId=null,animStart=null,fromState=null,toState=null;
  const DUR=700;

  function drawFrame(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='rgba(0,0,0,0.025)';
    ctx.strokeStyle='rgba(0,0,0,0.12)';
    ctx.lineWidth=0.5;
    roundRect(ctx,sX,sY,sW,sH,10);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.font='10px -apple-system,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText('STAGE BACK',midX,sY+16);
    ctx.fillText('STAGE FRONT — AUDIENCE',midX,sY+sH-5);
    state.forEach(d=>{
      ctx.beginPath(); ctx.arc(d.x,d.y,15,0,Math.PI*2);
      ctx.fillStyle=COL[d.g]; ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=0.5; ctx.stroke();
      ctx.fillStyle='#fff';
      ctx.font='bold 7.5px -apple-system,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(d.id,d.x,d.y);
    });
  }

  function roundRect(c,x,y,w,h,r){
    c.beginPath();
    c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
    c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
    c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
  }

  function ease(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

  function animate(ts){
    if(!animStart)animStart=ts;
    const t=ease(Math.min((ts-animStart)/DUR,1));
    state.forEach((d,i)=>{
      d.x=fromState[i].x+(toState[i].x-fromState[i].x)*t;
      d.y=fromState[i].y+(toState[i].y-fromState[i].y)*t;
    });
    drawFrame();
    if(t<1){animId=requestAnimationFrame(animate);}
    else{animId=null;animStart=null;}
  }

  function goTo(i){
    cur=i;
    if(animId){cancelAnimationFrame(animId);animId=null;animStart=null;}
    fromState=state.map(d=>({...d}));
    const tmap={};
    steps[i].dots.forEach(d=>{tmap[d.id]=d;});
    toState=state.map(d=>{const m=tmap[d.id];return m?{...d,x:m.x,y:m.y}:{...d};});
    document.getElementById('desc').textContent=steps[i].desc;
    document.querySelectorAll('.pill').forEach((p,j)=>p.classList.toggle('on',j===i));
    animId=requestAnimationFrame(animate);
  }

  function next(){if(cur<steps.length-1)goTo(cur+1);}
  function prev(){if(cur>0)goTo(cur-1);}
  window.goTo=goTo; window.next=next; window.prev=prev;
  drawFrame();
})();
</script>
</body>
</html>
